<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SBTI 人格测试</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 12px 32px rgba(47, 73, 55, 0.08);
      --radius: 20px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #f8fff8 0, #f6faf6 40%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--safe-t);
    }

    .shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 16px 14px calc(24px + var(--safe-b));
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* —— 首页 —— */
    .hero {
      padding: 28px 20px 24px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(1.45rem, 5.5vw, 2rem);
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin: 0 0 20px;
    }
    .intro-actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .intro-actions-row .btn-primary,
    .intro-actions-row .btn-secondary {
      flex: 1;
      min-width: 132px;
      max-width: 100%;
    }
    .intro-history {
      margin-top: 14px;
      text-align: left;
    }
    .intro-history summary {
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      list-style: none;
    }
    .intro-history summary::-webkit-details-marker { display: none; }
    .intro-history-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
    }
    .intro-history-list li { margin-top: 8px; }
    .history-item-btn {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--soft);
      font: inherit;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }
    .history-item-btn:active {
      opacity: 0.92;
    }
    .author-note {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .mirror {
      margin-top: 1.25rem;
      text-align: left;
    }
    .mirror summary {
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      list-style: none;
    }
    .mirror summary::-webkit-details-marker { display: none; }
    .mirror-body {
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.65;
      padding-top: 0.5rem;
    }
    .mirror-p { margin: 0.5rem 0; }
    .mirror-footer {
      margin: 1rem 0.25rem 0;
      font-size: 0.65rem;
      color: rgba(128, 128, 128, 0.45);
      line-height: 1.55;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease;
      font: inherit;
      touch-action: manipulation;
    }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    button:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 22px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(77, 106, 83, 0.2);
      font-weight: 700;
      min-height: 48px;
    }
    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
      min-height: 48px;
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      font-size: 0.9rem;
      min-height: 44px;
    }

    /* —— 向导 —— */
    .wizard-card-wrap {
      padding-bottom: 8px;
    }
    .wizard-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .wizard-head .wizard-prev-top {
      padding: 10px 14px;
      min-height: 40px;
      font-size: 0.88rem;
      border-radius: 12px;
    }
    .wizard-progress-track {
      height: 8px;
      background: #edf3ee;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .wizard-progress-track > span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #97b59c, #5b7a62);
      border-radius: inherit;
      transition: width .2s ease;
    }
    .wizard-progress-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .question-card {
      padding: 4px 2px 8px;
    }
    .question-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 11px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-weight: 600;
      color: var(--accent-strong);
    }
    .question-title {
      font-size: 1.05rem;
      line-height: 1.65;
      margin: 0 0 16px;
      white-space: pre-wrap;
      font-weight: 650;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      --option-selected-bg: #e8f1ea;
      /* --option-fill-ms 由内联样式与 JS 中 ADVANCE_DELAY_MS 同步 */
    }
    .option {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      min-height: 52px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    /* 选中且未在播放：整卡已是浅绿底 */
    .option:has(input:checked):not(.option--progress) {
      border-color: rgba(77, 106, 83, 0.22);
      background: var(--option-selected-bg);
    }
    /* 播放进度中：底为白，浅绿由 fill 从左向右铺满 */
    .option.option--progress:has(input:checked) {
      border-color: var(--line);
      background: #fff;
    }
    .option-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      transform: scaleX(0);
      transform-origin: left center;
      border-radius: inherit;
      background: var(--option-selected-bg);
      pointer-events: none;
      z-index: 0;
    }
    .option--progress .option-fill {
      animation: option-fill-wipe var(--option-fill-ms, 560ms) linear forwards;
    }
    @keyframes option-fill-wipe {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }
    .option.option--progress:has(input:checked) .option-code {
      color: #3d5a42;
    }
    .option.option--progress:has(input:checked) .option-text {
      font-weight: 600;
      color: var(--text);
    }
    .option:has(input:checked):not(.option--progress) .option-code {
      color: #3d5a42;
    }
    .option:has(input:checked):not(.option--progress) .option-text {
      font-weight: 600;
      color: var(--text);
    }
    .option input,
    .option .option-code,
    .option .option-text {
      position: relative;
      z-index: 1;
    }
    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      width: 1.15rem;
      height: 1.15rem;
      flex-shrink: 0;
    }
    .option-code {
      font-weight: 800;
      min-width: 1.25rem;
      flex-shrink: 0;
    }
    /* 未选中：字母不用深绿，避免与选中/进度形成第三种强调色 */
    .option:not(:has(input:checked)) .option-code {
      color: var(--muted);
    }
    .option-text {
      flex: 1;
      line-height: 1.55;
      font-size: 0.95rem;
    }
    .wizard-hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin: 18px 0 8px;
      min-height: 2.6em;
    }

    /* —— 结果 —— */
    .result-wrap { padding: 18px 16px 24px; }
    .result-top {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .poster-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #ffffff, #f7fbf8);
      overflow: hidden;
    }
    .poster-box.no-image .poster-image { display: none; }
    .poster-image {
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.8);
    }
    .poster-caption {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .type-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
    .type-kicker {
      font-size: 12px;
      color: var(--accent-strong);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }
    .type-name {
      font-size: clamp(1.35rem, 5vw, 1.85rem);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .match {
      margin-top: 14px;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 13px;
      line-height: 1.4;
    }
    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }
    .analysis-box, .dim-box, .note-box {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
    }
    .analysis-box h3, .dim-box h3, .note-box h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .analysis-box p {
      margin: 0;
      font-size: 15px;
      line-height: 1.85;
      color: #304034;
      white-space: pre-wrap;
    }
    .dim-list { display: flex; flex-direction: column; gap: 10px; }
    .dim-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
    }
    .dim-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .dim-item-name { font-size: 14px; font-weight: 700; }
    .dim-item-score { font-size: 14px; font-weight: 800; color: var(--accent-strong); }
    .dim-item p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.75;
    }
    .note-box p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.75;
    }
    details.author-box {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #fbfdfb);
      overflow: hidden;
    }
    .author-box summary {
      list-style: none;
      cursor: pointer;
      padding: 16px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .author-box summary::-webkit-details-marker { display: none; }
    .author-box summary::after {
      content: '展开';
      font-size: 12px;
      color: var(--accent-strong);
    }
    .author-box[open] summary::after { content: '收起'; }
    #authorContent {
      border-top: 1px solid var(--line);
      padding: 0 16px 16px;
      font-size: 14px;
      line-height: 1.85;
      color: #304034;
    }
    #authorContent p { margin: 12px 0 0; }
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .result-actions button { flex: 1; min-width: 140px; }

    @media (min-width: 480px) {
      .shell { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card">
        <h1 id="introTitle">SBTI</h1>
        <div class="intro-actions-row" id="introActionsRow">
          <button type="button" id="viewLastResultBtn" class="btn-secondary" hidden>查看结果</button>
          <button type="button" id="startBtn" class="btn-primary">开始测试</button>
        </div>
        <details class="intro-history" id="introHistory" hidden>
          <summary id="introHistorySummary">历次结果</summary>
          <ul id="introHistoryList" class="intro-history-list"></ul>
        </details>
        <div class="author-note">
          <span id="authorLine" title=""></span>
        </div>
        <details class="mirror">
          <summary id="mirrorSummary">关于本镜像</summary>
          <div class="mirror-body" id="mirrorBody"></div>
          <div class="mirror-footer" id="mirrorFooter"></div>
        </details>
      </div>
    </section>

    <section id="wizard" class="screen">
      <div class="wizard-card-wrap">
        <div class="card" style="padding: 16px 16px 8px;">
          <div class="wizard-head">
            <button type="button" id="wizardBackHome" class="btn-ghost">← 首页</button>
            <button type="button" id="wizardPrev" class="btn-secondary wizard-prev-top">上一题</button>
          </div>
          <div class="wizard-progress-track"><span id="wizardProgressBar"></span></div>
          <div class="wizard-progress-label" id="wizardProgressText">0 / 0</div>
          <div id="wizardQuestionHost"></div>
          <p class="wizard-hint" id="wizardHint"></p>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-top">
          <div class="poster-box" id="posterBox">
            <img id="posterImage" class="poster-image" alt="" />
            <div id="posterCaption" class="poster-caption"></div>
          </div>
          <div class="type-box">
            <div class="type-kicker" id="resultModeKicker"></div>
            <div class="type-name" id="resultTypeName"></div>
            <div class="match" id="matchBadge"></div>
            <div class="type-subname" id="resultTypeSub"></div>
          </div>
        </div>
        <div class="analysis-box">
          <h3 id="analysisTitle">该人格的简单解读</h3>
          <p id="resultDesc"></p>
        </div>
        <div class="dim-box">
          <h3 id="dimTitle">十五维度评分</h3>
          <div id="dimList" class="dim-list"></div>
        </div>
        <div class="note-box">
          <h3 id="noteTitle">友情提示</h3>
          <p id="funNote"></p>
        </div>
        <details class="author-box">
          <summary id="authorSummary">作者的话</summary>
          <div id="authorContent"></div>
        </details>
        <div class="result-actions">
          <button type="button" id="restartBtn" class="btn-secondary">重新测试</button>
          <button type="button" id="toTopBtn" class="btn-primary">回到首页</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./js/sbti-app.js"></script>
  <script>
    window.addEventListener('load', function () {
      if (!window.__sbtiAppLoaded) {
        var t = document.getElementById('introTitle');
        var b = document.getElementById('startBtn');
        if (t) t.textContent = '无法加载测验脚本，请用本地 HTTP 服务打开本目录（如 npx serve）。';
        if (b) b.disabled = true;
      }
    });
  </script>

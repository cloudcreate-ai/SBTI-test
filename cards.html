<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SBTI 人格图鉴</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 12px 32px rgba(47, 73, 55, 0.08);
      --radius: 20px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #f8fff8 0, #f6faf6 40%, #f2f7f3 100%);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-top: var(--safe-t);
    }
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px calc(28px + var(--safe-b));
    }
    .page-head {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .page-head h1 {
      font-size: clamp(1.35rem, 4.5vw, 1.75rem);
      margin: 0;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .page-head p {
      margin: 6px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--accent-strong);
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(47, 73, 55, 0.06);
    }
    .back-link:hover {
      background: #fafcfb;
      border-color: #c5d8c9;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .toolbar label {
      flex: 1;
      min-width: 200px;
    }
    .toolbar input[type="search"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font: inherit;
      font-size: 0.95rem;
      background: var(--panel);
    }
    .toolbar input[type="search"]:focus {
      outline: 2px solid rgba(77, 106, 83, 0.25);
      outline-offset: 1px;
    }
    .count-badge {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(152px, 1fr));
      gap: 12px;
    }
    .type-card {
      display: flex;
      flex-direction: column;
      text-align: left;
      padding: 0;
      margin: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel);
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: box-shadow 0.15s ease, transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .type-card:hover {
      box-shadow: var(--shadow);
    }
    .type-card:active {
      transform: scale(0.98);
    }
    .type-card:focus-visible {
      outline: 2px solid var(--accent-strong);
      outline-offset: 2px;
    }
    .type-card-thumb {
      background: var(--soft);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    .type-card-thumb img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .type-card-meta {
      padding: 10px 11px 12px;
      border-top: 1px solid var(--line);
    }
    .type-card-name {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .type-card-code {
      margin-top: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    /* 详情弹层 */
    dialog.type-dialog {
      width: min(100vw - 24px, 420px);
      max-height: min(88vh, 720px);
      margin: auto;
      padding: 0;
      border: none;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--panel);
    }
    dialog.type-dialog::backdrop {
      background: rgba(30, 42, 34, 0.45);
    }
    .type-dialog-inner {
      display: flex;
      flex-direction: column;
      max-height: min(88vh, 720px);
    }
    .type-dialog-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .type-dialog-head h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
    }
    .type-dialog-close {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--soft);
      color: var(--accent-strong);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      font-weight: 700;
    }
    .type-dialog-close:hover {
      background: #e2ebe4;
    }
    .type-dialog-body {
      overflow: auto;
      padding: 12px 14px 18px;
      -webkit-overflow-scrolling: touch;
    }
    .type-dialog-poster {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--soft);
      display: block;
    }
    .type-dialog-banner {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, #fbfffb, #f0f6f1);
      border: 1px solid var(--line);
    }
    .type-dialog-banner .lead {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .type-dialog-banner .name {
      font-size: 1.15rem;
      font-weight: 800;
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .type-dialog-banner .code {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-strong);
      margin-top: 2px;
    }
    .type-dialog-cn-note {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .type-dialog-intro {
      margin-top: 14px;
      font-size: 0.95rem;
      font-weight: 650;
      line-height: 1.6;
    }
    .type-dialog-desc {
      margin-top: 10px;
      font-size: 0.9rem;
      line-height: 1.75;
      color: #304034;
    }
    @media (min-width: 480px) {
      .shell { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="page-head">
      <div>
        <h1>SBTI 人格图鉴</h1>
        <p>点击卡片查看简介与完整解读；可通过链接加 <code>#类型代码</code> 分享。</p>
      </div>
      <a class="back-link" href="./index.html">← 返回测验</a>
    </header>

    <div class="toolbar">
      <label>
        <span class="visually-hidden">搜索</span>
        <input type="search" id="typeSearch" placeholder="搜索代码或名称…" autocomplete="off" />
      </label>
      <span class="count-badge">共 <strong id="typeCount">0</strong> 种</span>
    </div>

    <div id="typeGrid" class="type-grid" role="list"></div>
  </div>

  <dialog id="typeDialog" class="type-dialog" aria-labelledby="typeDialogTitle">
    <div class="type-dialog-inner">
      <div class="type-dialog-head">
        <div>
          <h2 id="typeDialogTitle">人格详情</h2>
        </div>
        <button type="button" id="typeDialogClose" class="type-dialog-close" aria-label="关闭">×</button>
      </div>
      <div class="type-dialog-body">
        <img id="typeDialogPoster" class="type-dialog-poster" src="" alt="" />
        <div class="type-dialog-banner">
          <div id="typeDialogLead" class="lead"></div>
          <div id="typeDialogName" class="name"></div>
          <div id="typeDialogCode" class="code"></div>
          <div id="typeDialogCnNote" class="type-dialog-cn-note" hidden></div>
        </div>
        <p id="typeDialogIntro" class="type-dialog-intro"></p>
        <p id="typeDialogDesc" class="type-dialog-desc"></p>
      </div>
    </div>
  </dialog>

  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
  <script type="module" src="./js/sbti-cards.js"></script>
</body>
</html>
